<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tea Ticket — Сканер</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body class="min-h-screen bg-gray-900">

  <div class="max-w-md mx-auto px-4 py-6">

    <!-- Header -->
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-white">🍵 Admin Scanner</h1>
      <p class="text-gray-400 text-sm mt-1">Сканируйте QR-код билета</p>
    </div>

    <div x-data="adminScanner" @destroy.window="destroy()">

      <!-- Auth gate -->
      <template x-if="!authenticated">
        <div class="bg-gray-800 rounded-2xl p-6">
          <form @submit.prevent="checkPassword()" class="space-y-4">
            <div>
              <label for="password" class="block text-sm font-medium text-gray-400 mb-1">
                Пароль администратора
              </label>
              <input
                id="password"
                type="password"
                x-model="passwordInput"
                placeholder="Введите пароль"
                class="w-full px-4 py-2.5 rounded-xl bg-gray-700 border border-gray-600 text-white placeholder-gray-500 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-800 outline-none transition"
                autofocus
              />
            </div>
            <template x-if="authError">
              <p class="text-red-400 text-sm" x-text="authError"></p>
            </template>
            <button
              type="submit"
              class="w-full py-2.5 bg-emerald-600 text-white font-medium rounded-xl hover:bg-emerald-700 transition"
            >
              Войти
            </button>
          </form>
        </div>
      </template>

      <!-- Scanner (only after auth) -->
      <template x-if="authenticated">
        <div>

      <!-- Scanner area -->
      <div x-show="scanning || (!result && !loading)" class="rounded-2xl overflow-hidden bg-black mb-4">
        <div id="qr-reader" class="w-full"></div>
      </div>

      <!-- Loading -->
      <template x-if="loading">
        <div class="bg-gray-800 rounded-2xl p-8 text-center">
          <svg class="animate-spin h-10 w-10 text-emerald-500 mx-auto" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <p class="text-gray-400 mt-4">Проверка билета…</p>
        </div>
      </template>

      <!-- Result -->
      <template x-if="result && !loading">
        <div class="space-y-4">

          <!-- ── Group check-in panel ── -->
          <template x-if="result.type === 'group'">
            <div class="bg-gray-800 rounded-2xl p-5 space-y-4">
              <p class="text-white font-semibold text-center">Групповой билет</p>
              <p class="text-gray-400 text-sm text-center">Отметьте тех, кто пришёл сейчас</p>

              <div class="space-y-2">
                <template x-for="member in result.ticket.members" :key="member.id">
                  <label
                    class="flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition"
                    :class="member.checkedIn
                      ? 'bg-gray-700 opacity-50 cursor-not-allowed'
                      : isPersonSelected(member.id)
                        ? 'bg-emerald-900/60 border border-emerald-600'
                        : 'bg-gray-700 border border-transparent hover:border-gray-500'"
                  >
                    <input
                      type="checkbox"
                      :checked="member.checkedIn || isPersonSelected(member.id)"
                      :disabled="member.checkedIn"
                      @change="togglePerson(member.id)"
                      class="accent-emerald-500 w-4 h-4 flex-shrink-0"
                    />
                    <span
                      class="text-sm"
                      :class="member.checkedIn ? 'text-gray-500 line-through' : 'text-white'"
                      x-text="member.name"
                    ></span>
                    <template x-if="member.checkedIn">
                      <span class="ml-auto text-xs text-gray-500">уже прошёл</span>
                    </template>
                  </label>
                </template>
              </div>

              <button
                @click="checkinSelectedMembers()"
                :disabled="selectedPersonIds.length === 0"
                class="w-full py-3 bg-emerald-600 text-white font-semibold rounded-xl hover:bg-emerald-700 disabled:opacity-40 disabled:cursor-not-allowed transition"
                x-text="'Пропустить выбранных (' + selectedPersonIds.length + ')'"
              ></button>

              <button
                @click="reset()"
                class="w-full py-2 text-sm text-gray-400 hover:text-white transition"
              >
                Отмена — сканировать следующий
              </button>
            </div>
          </template>

          <!-- ── Solo / final result card ── -->
          <template x-if="result.type !== 'group'">
            <div class="space-y-4">

              <div
                class="rounded-2xl p-6 text-center"
                :class="{
                  'bg-emerald-900/50 border border-emerald-600': result.type === 'success',
                  'bg-amber-900/50 border border-amber-600': result.type === 'already',
                  'bg-red-900/50 border border-red-600': result.type === 'error'
                }"
              >
                <div class="text-5xl mb-3">
                  <span x-show="result.type === 'success'">✅</span>
                  <span x-show="result.type === 'already'">⚠️</span>
                  <span x-show="result.type === 'error'">❌</span>
                </div>
                <p
                  class="text-lg font-semibold mb-1"
                  :class="{
                    'text-emerald-300': result.type === 'success',
                    'text-amber-300': result.type === 'already',
                    'text-red-300': result.type === 'error'
                  }"
                  x-text="result.message"
                ></p>
              </div>

              <!-- Ticket details -->
              <template x-if="result.ticket">
                <div class="bg-gray-800 rounded-2xl p-5 space-y-2">
                  <div class="flex justify-between">
                    <span class="text-gray-500 text-sm">Номер</span>
                    <span class="font-mono text-sm text-white" x-text="result.ticket.id"></span>
                  </div>
                  <div class="flex justify-between">
                    <span class="text-gray-500 text-sm">Имя</span>
                    <span class="text-sm text-white" x-text="result.ticket.name"></span>
                  </div>
                  <div class="flex justify-between">
                    <span class="text-gray-500 text-sm">Зона</span>
                    <span class="text-sm text-white" x-text="result.ticket.zoneName"></span>
                  </div>
                  <div class="flex justify-between">
                    <span class="text-gray-500 text-sm">Телефон</span>
                    <span class="text-sm text-white" x-text="result.ticket.phone"></span>
                  </div>

                  <!-- Group members summary after check-in -->
                  <template x-if="result.ticket.members && result.ticket.members.length > 1">
                    <div class="pt-2 border-t border-gray-700 space-y-1">
                      <p class="text-xs text-gray-500 mb-1">Участники группы:</p>
                      <template x-for="m in result.ticket.members" :key="m.id">
                        <div class="flex items-center gap-2 text-sm">
                          <span x-show="m.checkedIn" class="text-emerald-400 text-xs">✓</span>
                          <span x-show="!m.checkedIn" class="text-gray-600 text-xs">○</span>
                          <span
                            :class="m.checkedIn ? 'text-gray-400 line-through' : 'text-white'"
                            x-text="m.name"
                          ></span>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>

              <!-- Scan again -->
              <button
                @click="reset()"
                class="w-full py-3 bg-emerald-600 text-white font-medium rounded-xl hover:bg-emerald-700 transition"
              >
                Сканировать следующий
              </button>

            </div>
          </template>

        </div>
      </template>

        </div>
      </template>

    </div>

    <p class="text-center text-xs text-gray-600 mt-6">
      Tea Ticket Admin &copy; 2026
    </p>
  </div>

  <script type="module" src="/src/admin.ts"></script>
</body>
</html>
