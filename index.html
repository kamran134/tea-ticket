<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tea Ticket — Бронирование</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body class="min-h-screen bg-gradient-to-br from-emerald-50 to-amber-50">

  <div class="max-w-md mx-auto px-4 py-8">

    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-emerald-800">🍵 Tea Ticket</h1>
      <p class="text-gray-600 mt-2">Забронируйте место на мероприятие</p>
    </div>

    <!-- Form card -->
    <div x-data="registerForm" x-init="init()" class="bg-white rounded-2xl shadow-lg p-6">

      <!-- Invalid link -->
      <template x-if="!venueId && !zonesLoading">
        <div class="text-center py-8">
          <div class="text-5xl mb-4">🔗</div>
          <p class="text-gray-600">Используйте ссылку, которую вам прислали организаторы.</p>
        </div>
      </template>

      <!-- Zones loading -->
      <template x-if="venueId && zonesLoading">
        <div class="flex flex-col items-center justify-center py-12 gap-3">
          <svg class="animate-spin h-8 w-8 text-emerald-500" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <p class="text-gray-500 text-sm">Загрузка мероприятия…</p>
        </div>
      </template>

      <!-- Zones error -->
      <template x-if="zonesError && !zonesLoading">
        <div class="bg-red-50 text-red-700 text-sm rounded-xl px-4 py-3" x-text="zonesError"></div>
      </template>

      <!-- Form -->
      <template x-if="venueId && !zonesLoading && !zonesError">
        <form @submit.prevent="submit()" class="space-y-5">

          <!-- Name + guests -->
          <div class="space-y-2">
            <label class="block text-sm font-medium text-gray-700">
              Имя и фамилия
            </label>

            <!-- Buyer -->
            <input
              id="name"
              type="text"
              x-model="name"
              placeholder="Некто Нектович"
              autocomplete="name"
              class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition"
            />

            <!-- Guest rows -->
            <template x-for="(guest, index) in guests" :key="index">
              <div class="flex items-center gap-2">
                <input
                  type="text"
                  :placeholder="'Гость ' + (index + 1)"
                  x-model="guest.name"
                  class="flex-1 px-4 py-2.5 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition"
                />
                <button
                  type="button"
                  @click="removeGuest(index)"
                  class="flex-shrink-0 w-9 h-9 flex items-center justify-center rounded-xl border border-red-200 text-red-500 hover:bg-red-50 transition"
                  title="Убрать гостя"
                >✕</button>
              </div>
            </template>

            <!-- Add guest button -->
            <button
              type="button"
              @click="addGuest()"
              class="flex items-center gap-1.5 text-sm text-emerald-700 hover:text-emerald-900 font-medium transition"
            >
              <span class="text-xl leading-none">+</span>
              <span>Добавить гостя</span>
            </button>
          </div>

          <!-- Phone -->
          <div>
            <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">
              Телефон
            </label>
            <input
              id="phone"
              type="tel"
              x-model="phone"
              placeholder="+994 (50) 123-45-67"
              autocomplete="tel"
              class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition"
            />
          </div>

          <!-- Zone selector -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Зона
            </label>
            <div class="space-y-2">
              <template x-for="zone in zones" :key="zone.id">
                <label
                  class="flex items-center justify-between p-3 rounded-xl border-2 cursor-pointer transition"
                  :class="selectedZoneId === zone.id
                    ? 'border-emerald-500 bg-emerald-50'
                    : zone.available > 0
                      ? 'border-gray-200 hover:border-emerald-300'
                      : 'border-gray-100 bg-gray-50 opacity-50 cursor-not-allowed'"
                >
                  <div class="flex items-center gap-3">
                    <input
                      type="radio"
                      :value="zone.id"
                      x-model="selectedZoneId"
                      :disabled="zone.available <= 0"
                      class="accent-emerald-600"
                    />
                    <div>
                      <p class="font-medium text-gray-800" x-text="zone.name"></p>
                      <p class="text-xs text-gray-500">
                        Свободно мест: <span x-text="zone.available"></span>
                      </p>
                    </div>
                  </div>
                  <span class="font-semibold text-emerald-700 whitespace-nowrap" x-text="zone.price + ' ₼'"></span>
                </label>
              </template>
            </div>
          </div>

          <!-- Selected zone summary -->
          <template x-if="selectedZone()">
            <div class="bg-emerald-50 rounded-xl px-4 py-3 space-y-1">
              <div class="flex items-center justify-between">
                <span class="text-sm text-gray-600">
                  <span x-text="1 + guests.length"></span>
                  <span x-text="(1 + guests.length) === 1 ? ' участник' : ' участника'"></span>
                  × <span x-text="selectedZone().price + ' ₼'"></span>
                </span>
                <span class="text-lg font-bold text-emerald-700" x-text="totalPrice() + ' ₼'"></span>
              </div>
            </div>
          </template>

          <!-- Error -->
          <template x-if="error">
            <div class="bg-red-50 text-red-700 text-sm rounded-xl px-4 py-3" x-text="error"></div>
          </template>

          <!-- Submit -->
          <button
            type="submit"
            :disabled="loading || !name || !phone || !selectedZoneId"
            class="w-full py-3 bg-emerald-600 text-white font-semibold rounded-xl hover:bg-emerald-700 disabled:opacity-40 disabled:cursor-not-allowed transition flex items-center justify-center gap-2"
          >
            <template x-if="loading">
              <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
            </template>
            <span x-text="loading ? 'Бронирование…' : 'Забронировать место'"></span>
          </button>

        </form>
      </template>

    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      Tea Ticket &copy; 2026
    </p>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
