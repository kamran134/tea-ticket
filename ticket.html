<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tea Ticket — Мой билет</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body class="min-h-screen bg-gradient-to-br from-emerald-50 to-amber-50">

  <div class="max-w-md mx-auto px-4 py-8">

    <!-- Header -->
    <div class="text-center mb-8">
      <a href="/" class="text-3xl font-bold text-emerald-800 no-underline">🍵 Tea Ticket</a>
    </div>

    <div x-data="ticketView" x-init="init()" @destroy.window="destroy()" class="bg-white rounded-2xl shadow-lg overflow-hidden">

      <!-- Loading -->
      <template x-if="loading">
        <div class="flex flex-col items-center justify-center py-16">
          <svg class="animate-spin h-8 w-8 text-emerald-600" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          <span class="text-gray-500 mt-3">Загрузка билета…</span>
        </div>
      </template>

      <!-- Error -->
      <template x-if="!loading && error">
        <div class="text-center py-16 px-6">
          <div class="text-5xl mb-4">😕</div>
          <h2 class="text-lg font-semibold text-gray-800 mb-2">Билет не найден</h2>
          <p class="text-gray-500 text-sm" x-text="error"></p>
          <a href="/" class="inline-block mt-6 text-emerald-600 hover:text-emerald-700 font-medium">
            ← На главную
          </a>
        </div>
      </template>

      <!-- Ticket card -->
      <template x-if="!loading && !error && ticket">
        <div>

          <!-- Status banner -->
          <div :class="statusColor" class="px-6 py-3 text-center font-medium text-sm">
            <span x-text="statusLabel"></span>
            <template x-if="ticket.checkedIn">
              <span class="ml-2">· Вход выполнен ✓</span>
            </template>
          </div>

          <div class="p-6 space-y-6">

            <!-- ── BOOKED: payment instructions ── -->
            <template x-if="ticket.status === 'Booked'">
              <div class="space-y-5">

                <!-- Countdown -->
                <div class="flex flex-col items-center bg-blue-50 rounded-2xl px-4 py-5 gap-1">
                  <p class="text-sm text-blue-600 font-medium">Время на оплату</p>
                  <p
                    class="text-4xl font-mono font-bold"
                    :class="timeLeftMs < 5 * 60 * 1000 ? 'text-red-600' : 'text-blue-700'"
                    x-text="formattedTime()"
                  ></p>
                  <p class="text-xs text-blue-500">У вас есть 1 час с момента бронирования</p>
                </div>

                <!-- Payment info -->
                <div class="bg-amber-50 rounded-2xl px-4 py-4 space-y-3">
                  <p class="text-sm font-semibold text-amber-800">Инструкция по оплате</p>
                  <p class="text-sm text-amber-700">
                    Переведите <strong x-text="ticket.price + ' ₼'"></strong> на карту:
                  </p>
                  <template x-if="cardNumber">
                    <div class="flex items-center justify-between bg-white rounded-xl px-4 py-3 border border-amber-200">
                      <span class="font-mono font-bold text-gray-800 tracking-wider" x-text="cardNumber"></span>
                      <button
                        type="button"
                        @click="navigator.clipboard.writeText(cardNumber)"
                        class="text-xs text-amber-600 hover:text-amber-800 transition font-medium"
                      >
                        Копировать
                      </button>
                    </div>
                  </template>
                  <template x-if="!cardNumber">
                    <p class="text-xs text-amber-600">Реквизиты уточните у организаторов</p>
                  </template>
                  <p class="text-sm text-amber-700">
                    После оплаты прикрепите скриншот чека ниже.
                  </p>
                </div>

                <!-- Receipt upload -->
                <div>
                  <p class="text-sm font-medium text-gray-700 mb-2">Прикрепить чек об оплате</p>

                  <template x-if="uploadDone">
                    <div class="text-center py-4">
                      <div class="text-3xl mb-2">✅</div>
                      <p class="text-sm text-emerald-700 font-medium">Чек отправлен! Ждём подтверждения.</p>
                    </div>
                  </template>

                  <template x-if="!uploadDone">
                    <div class="space-y-3">

                      <!-- Drop zone -->
                      <template x-if="!receiptFile">
                        <label
                          for="receipt"
                          class="flex flex-col items-center justify-center w-full h-28 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:border-emerald-400 hover:bg-emerald-50/50 transition"
                        >
                          <span class="text-2xl text-gray-400">📎</span>
                          <span class="text-sm text-gray-500 mt-1">Нажмите для загрузки</span>
                          <span class="text-xs text-gray-400 mt-0.5">JPEG, PNG, WebP, PDF — до 5 МБ</span>
                          <input
                            id="receipt"
                            type="file"
                            accept="image/jpeg,image/png,image/webp,application/pdf"
                            @change="handleFileSelect($event)"
                            class="hidden"
                          />
                        </label>
                      </template>

                      <!-- Preview -->
                      <template x-if="receiptFile">
                        <div class="relative border border-gray-200 rounded-xl p-3">
                          <template x-if="receiptPreview">
                            <img
                              :src="receiptPreview"
                              alt="Чек"
                              class="w-full h-40 object-contain rounded-lg bg-gray-50"
                            />
                          </template>
                          <template x-if="!receiptPreview">
                            <div class="flex items-center gap-2 py-2">
                              <span class="text-2xl">📄</span>
                              <span x-text="receiptFile.name" class="text-sm text-gray-600 truncate"></span>
                            </div>
                          </template>
                          <button
                            type="button"
                            @click="removeFile()"
                            class="absolute top-2 right-2 w-7 h-7 bg-red-100 text-red-600 rounded-full flex items-center justify-center hover:bg-red-200 transition"
                          >✕</button>
                        </div>
                      </template>

                      <!-- Upload error -->
                      <template x-if="uploadError">
                        <div class="bg-red-50 text-red-700 text-sm rounded-xl px-4 py-3" x-text="uploadError"></div>
                      </template>

                      <!-- Submit button -->
                      <button
                        type="button"
                        @click="submitReceipt()"
                        :disabled="!receiptFile || uploadLoading"
                        class="w-full py-3 bg-emerald-600 text-white font-semibold rounded-xl hover:bg-emerald-700 disabled:opacity-40 disabled:cursor-not-allowed transition flex items-center justify-center gap-2"
                      >
                        <template x-if="uploadLoading">
                          <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                          </svg>
                        </template>
                        <span x-text="uploadLoading ? 'Отправка…' : 'Отправить чек'"></span>
                      </button>

                    </div>
                  </template>
                </div>

              </div>
            </template>

            <!-- ── CONFIRMED: QR code ── -->
            <template x-if="ticket.status === 'Confirmed' && qrDataUrl">
              <div class="text-center">
                <img
                  :src="qrDataUrl"
                  alt="QR-код билета"
                  class="mx-auto w-56 h-56 rounded-xl border border-gray-100"
                />
                <p class="text-xs text-gray-400 mt-2">Покажите QR-код на входе</p>
              </div>
            </template>

            <!-- ── PENDING ── -->
            <template x-if="ticket.status === 'Pending'">
              <div class="text-center py-4">
                <div class="text-4xl mb-3">⏳</div>
                <p class="text-gray-600 text-sm">
                  Ваш чек получен и проверяется. QR-код для входа появится после подтверждения оплаты.
                </p>
              </div>
            </template>

            <!-- ── REJECTED ── -->
            <template x-if="ticket.status === 'Rejected'">
              <div class="text-center py-4">
                <div class="text-4xl mb-3">❌</div>
                <p class="text-gray-600 text-sm">
                  К сожалению, оплата не подтверждена. Свяжитесь с организаторами.
                </p>
              </div>
            </template>

            <!-- ── EXPIRED ── -->
            <template x-if="ticket.status === 'Expired'">
              <div class="text-center py-4">
                <div class="text-4xl mb-3">⌛</div>
                <p class="text-gray-600 text-sm mb-4">
                  Время на оплату истекло. Бронирование отменено.
                </p>
                <a
                  :href="'/?venue=' + ticket.venueId"
                  class="inline-block px-5 py-2.5 bg-emerald-600 text-white text-sm font-medium rounded-xl hover:bg-emerald-700 transition"
                >
                  Забронировать снова
                </a>
              </div>
            </template>

            <!-- ── Ticket info ── -->
            <div class="space-y-3 border-t border-gray-100 pt-4">
              <div class="flex justify-between">
                <span class="text-gray-500 text-sm">Номер</span>
                <span class="font-mono text-sm font-medium text-gray-800" x-text="ticket.id"></span>
              </div>
              <div class="flex justify-between">
                <span class="text-gray-500 text-sm">Имя</span>
                <span class="text-sm text-gray-800" x-text="ticket.name"></span>
              </div>
              <div class="flex justify-between">
                <span class="text-gray-500 text-sm">Телефон</span>
                <span class="text-sm text-gray-800" x-text="ticket.phone"></span>
              </div>
              <div class="flex justify-between">
                <span class="text-gray-500 text-sm">Зона</span>
                <span class="text-sm text-gray-800" x-text="ticket.zoneName"></span>
              </div>
              <div class="flex justify-between">
                <span class="text-gray-500 text-sm">Стоимость</span>
                <span class="text-sm font-semibold text-gray-800"><span x-text="ticket.price"></span> ₼</span>
              </div>
            </div>

          </div>
        </div>
      </template>

    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      Tea Ticket &copy; 2026
    </p>
  </div>

  <script type="module" src="/src/ticket.ts"></script>
</body>
</html>
